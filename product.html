<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ToolsSparrow — Product Details</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --accent: #a78bfa;
            --text-dim: #8e8e93;
            --text-muted: #6c6c70;
            --nav-height: 88px;
            --font: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: #ffffff;
            font-family: var(--font);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--nav-height);
            padding: 0 5%;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .logo img {
            width: 45px;
            height: 45px;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }

        .logo-text span {
            color: #8b5cf6;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #fff;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .nav-icon {
            color: #aaa;
            font-size: 1.1rem;
            transition: color 0.3s;
            text-decoration: none;
            position: relative;
        }

        .nav-icon:hover {
            color: #fff;
        }

        .badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #8b5cf6;
            font-size: 0.6rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-container {
            position: relative;
        }

        .search-container i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            color: #666;
        }

        .search-input {
            padding: 0.4rem 0.8rem 0.4rem 1.8rem;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            width: 180px;
            outline: none;
        }

        .search-input:focus {
            width: 220px;
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 6%;
        }

        .hero-minimal {
            text-align: center;
            padding: clamp(140px, 16vh, 180px) 0 64px;
            max-width: 720px;
            margin: 0 auto;
        }

        .hero-minimal h1 {
            font-size: clamp(2.8rem, 6.5vw, 4.2rem);
            font-weight: 600;
            letter-spacing: -0.045em;
            line-height: 1.08;
            margin-bottom: 14px;
            color: #ffffff;
        }

        .hero-minimal p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-dim);
            max-width: 420px;
            margin: 0 auto 26px;
            font-weight: 400;
        }

        .price-minimal {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 10px;
            margin-bottom: 26px;
        }

        .price-minimal .current {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #fff;
        }

        .price-minimal .original {
            font-size: 1.2rem;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .actions-minimal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-buy {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 11px 26px;
            border-radius: 40px;
            font-weight: 400;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-buy:hover {
            background: #e8e8ed;
            transform: scale(0.97);
        }

        .btn-wish-minimal {
            background: transparent;
            color: #ffffff;
            border: 0.5px solid rgba(255, 255, 255, 0.16);
            padding: 11px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.82rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-wish-minimal:hover {
            border-color: rgba(255, 77, 77, 0.4);
            background: rgba(255, 77, 77, 0.04);
        }

        .btn-wish-minimal.active {
            border-color: rgba(255, 77, 77, 0.4);
            background: rgba(255, 77, 77, 0.08);
        }

        .btn-wish-minimal.active i {
            color: rgb(255, 77, 77);
            font-weight: 900;
        }

        .product-duo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            margin: 20px 0 100px;
            align-items: center;
        }

        @media (max-width: 968px) {
            .product-duo {
                grid-template-columns: 1fr;
                gap: 48px;
                text-align: center;
            }

            .right-details {
                max-width: 480px;
                margin: 0 auto;
            }
        }

        .image-soft {
            position: relative;
            border-radius: 48px;
            overflow: hidden;
            background: #050505;
            aspect-ratio: 1;
        }

        .image-soft img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .image-soft:hover img {
            transform: scale(1.02);
        }

        .right-details {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .details-title {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            color: #fff;
            line-height: 1.2;
        }

        .spec-list {
            display: flex;
            flex-direction: column;
            border-top: 0.5px solid rgba(255, 255, 255, 0.08);
        }

        .spec-row-minimal {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
        }

        .spec-label {
            color: var(--text-muted);
            font-weight: 430;
        }

        .spec-value {
            color: #fff;
            font-weight: 470;
            letter-spacing: -0.2px;
        }

        .trust-inline {
            display: flex;
            gap: 24px;
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 450;
        }

        .trust-inline i {
            color: var(--accent);
            font-size: 0.4rem;
            margin-right: 4px;
        }

        .feature-wall {
            margin: 120px 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background-color: #181818;
            border-radius: 32px;
            overflow: hidden;
        }

        .feature-tile {
            background: #121212;
            padding: 48px 32px;
            transition: 0.2s;
        }

        .feature-tile:hover {
            background: #181818;
        }

        .feature-tile .tile-icon {
            font-size: 1.6rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .feature-tile h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .feature-tile p {
            color: var(--text-dim);
            font-size: 0.8rem;
            line-height: 1.5;
        }

        @media (max-width: 800px) {
            .feature-wall {
                grid-template-columns: 1fr;
            }
        }

        .value-section {
            margin: 100px 0;
        }

        .value-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 56px;
        }

        .value-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        @media (max-width: 800px) {
            .value-grid {
                grid-template-columns: 1fr;
            }
        }

        .value-card {
            background: #121212;
            border-radius: 28px;
            padding: 36px 28px;
            border: 0.5px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            transition: 0.2s;
        }

        .value-card:hover {
            background: #181818;
            transform: translateY(-2px);
        }

        .value-card i {
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .steps-panel {
            background: #121212;
            border-radius: 40px;
            padding: 56px 48px;
            margin: 100px 0;
            border: 0.5px solid rgba(255, 255, 255, 0.04);
        }

        .steps-panel h3 {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 48px;
        }

        .steps-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .step-item {
            flex: 1;
            text-align: center;
            min-width: 130px;
        }

        .step-num {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--accent);
            margin: 0 auto 16px;
        }

        .faq-module {
            max-width: 880px;
            margin: 100px auto;
        }

        .faq-module h2 {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 48px;
        }

        .faq-list {
            border-top: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .faq-entry {
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.04);
            padding: 22px 0;
            cursor: pointer;
        }

        .faq-q {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .faq-a {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            color: var(--text-dim);
            font-size: 0.8rem;
            line-height: 1.6;
        }

        .faq-entry.active .faq-a {
            max-height: 180px;
            padding-top: 14px;
        }

        .faq-arrow {
            transition: transform 0.2s;
            font-size: 0.7rem;
        }

        .faq-entry.active .faq-arrow {
            transform: rotate(45deg);
        }

        .warranty-banner {
            background: #121212;
            border-radius: 48px;
            padding: 52px 32px;
            text-align: center;
            margin: 80px 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .related-section {
            margin: 80px 0 60px;
        }

        .related-section h3 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 32px;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        @media (max-width: 1000px) {
            .related-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .related-grid {
                grid-template-columns: 1fr;
            }
        }

        .rel-item {
            background: #222;
            border-radius: 28px;
            overflow: hidden;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            transition: 0.2s;
            cursor: pointer;
        }

        .rel-item:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .rel-img {
            aspect-ratio: 1;
            background: #0d0d0d;
        }

        .rel-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rel-detail {
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rel-name {
            font-weight: 500;
            font-size: 0.85rem;
        }

        .rel-prices {
            font-weight: 600;
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 50px 0 40px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.04);
            color: var(--text-dim);
            font-size: 0.65rem;
        }

        .error-state {
            text-align: center;
            padding: 120px 20px;
            color: #bbb;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="img/tlogo.png" alt="ToolsSparrow">
            <span class="logo-text">Tools<span>Sparrow</span></span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="shop.html" class="nav-link">Shop</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <!-- <li><a href="product.html" class="nav-link active">Product</a></li> -->
        </ul>
        <div class="nav-actions">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" placeholder="Find services...">
            </div>
            <a href="#" class="nav-icon"><i class="far fa-heart"></i></a>
            <a href="#" class="nav-icon"><i class="far fa-user"></i></a>
            <a href="#" class="nav-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge">3</span>
            </a>
        </div>
    </nav>

    <main class="container" id="productContainer"></main>
    <footer>© 2026 ToolsSparrow — Premium Digital Subscriptions</footer>

    <script src="product.js">
    </script>
</body>

</html>
